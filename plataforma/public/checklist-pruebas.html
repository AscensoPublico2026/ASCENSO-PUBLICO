<style>

  .wrap{max-width:900px;margin:0 auto;padding:0 16px;}
  h1{margin:0 0 4px;font-size:1.25rem;}
  .sub{margin:0;font-size:.85rem;color:rgba(255,255,255,.8);}
  .barra-cont{margin-top:14px;background:rgba(255,255,255,.18);border-radius:8px;height:12px;overflow:hidden;}
  .barra{height:100%;width:0;background:linear-gradient(90deg,var(--oro),var(--oro2));border-radius:8px;transition:width .3s;}
  .resumen{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:.82rem;font-weight:700;}
  .resumen span{background:rgba(255,255,255,.12);padding:4px 10px;border-radius:20px;}
  .acciones{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn{border:none;cursor:pointer;font-weight:800;font-size:.82rem;border-radius:9px;padding:9px 14px;font-family:inherit;}
  .btn-oro{background:linear-gradient(135deg,var(--oro),var(--oro2));color:var(--navy);}
  .btn-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.3);}
  main{max-width:900px;margin:22px auto 80px;padding:0 16px;}
  details{background:#fff;border:1px solid var(--borde);border-radius:14px;margin-bottom:14px;overflow:hidden;}
  summary{cursor:pointer;padding:16px 18px;font-weight:800;font-size:1rem;list-style:none;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  summary::-webkit-details-marker{display:none;}
  summary .cnt{font-size:.78rem;font-weight:700;color:var(--gris);background:var(--crema);padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .seccion-intro{padding:0 18px 6px;font-size:.82rem;color:var(--gris);margin-top:-6px;}
  .item{padding:13px 18px;border-top:1px solid var(--borde);}
  .item-top{display:flex;gap:10px;align-items:flex-start;}
  .pills{display:flex;gap:6px;flex-shrink:0;}
  .pill{border:1.5px solid var(--borde);background:#fff;color:var(--gris);font-weight:800;font-size:.72rem;border-radius:7px;padding:5px 8px;cursor:pointer;font-family:inherit;}
  .pill.ok.activo{background:var(--ok);border-color:var(--ok);color:#fff;}
  .pill.falla.activo{background:var(--falla);border-color:var(--falla);color:#fff;}
  .item-body{flex:1;}
  .item-q{font-size:.93rem;font-weight:700;}
  .item-c{font-size:.83rem;color:var(--gris);margin-top:3px;}
  .item-c b{color:var(--navy2);}
  .item.estado-ok{background:rgba(30,158,90,.06);}
  .item.estado-falla{background:rgba(214,69,69,.06);}
  .nota{margin-top:8px;width:100%;border:1px solid var(--borde);border-radius:8px;padding:8px 10px;font-family:inherit;font-size:.85rem;resize:vertical;display:none;}
  .item.estado-falla .nota{display:block;}
  .foot{text-align:center;font-size:.78rem;color:var(--gris);margin-top:20px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-weight:700;font-size:.85rem;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50;}
  .toast.show{opacity:1;}
</style>
</head>

</header>

    {q:"Eliminar.", c:"El botón eliminar debe borrar la convocatoria."},
    {q:"Imagen por URL.", c:"Al poner una URL de imagen (ej. /fotos/nacional.jpg), debe verse en la tarjeta."}
  ]},
  {id:"E5", t:"E5 · Admin · Usuarios", intro:"", items:[
    {q:"Lista de usuarios.", c:"Debe mostrar nombre, correo, celular, rol y fecha de cada usuario."},
    {q:"Admin sin botón eliminar.", c:"Los usuarios admin deben tener el badge 'ADMIN' y NO mostrar el botón de eliminar."},

  {id:"F", t:"F · Correos (entregabilidad)", intro:"", items:[
    {q:"Confirmación al cliente.", c:"Revisa que el correo de compra al cliente llegue y se vea con la marca."},
    {q:"Aviso al admin.", c:"El aviso de compra debe llegar a ascensopublico@gmail.com."},
    {q:"Recuperación de contraseña.", c:"Debe llegar en español, con marca, y el enlace debe funcionar."},
    {q:"No caen en spam.", c:"Si algún correo cae en spam, anótalo (sería pendiente de configurar DMARC)."},

  {id:"G", t:"G · Seguridad y rutas protegidas", intro:"Prueba estando SIN sesión (o en ventana incógnita).", items:[
    {q:"/perfil sin sesión.", c:"Sin loguear, entra a /perfil: debe redirigir a /login."},
    {q:"/guia sin sesión.", c:"Sin loguear, entra a una URL de guía: debe redirigir a /login."},
    {q:"/admin sin sesión.", c:"Sin loguear, entra a /admin: debe redirigir o negar acceso."},
    {q:"Cliente no entra a admin.", c:"Con una cuenta de cliente normal, intenta entrar a /admin: debe ser rechazado."},
    {q:"No ver curso ajeno.", c:"Un cliente no debe poder abrir el curso de otro cliente cambiando la URL."},

    {q:"El curso se arma solo.", c:"El nuevo curso debe traer ya las funcionales + entidad + simulacro del primero, sin duplicar las genéricas."},

];

const KEY = "ap_checklist_v2";
let estado = JSON.parse(localStorage.getItem(KEY) || "{}");

function render(){
  const cont = document.getElementById("contenido");
  cont.innerHTML = "";
  DATA.forEach(sec=>{
    const det = document.createElement("details");
    if(sec.id==="P0"||sec.id==="A1") det.open = true;
    const sum = document.createElement("summary");
    const cnt = document.createElement("span"); cnt.className="cnt"; cnt.id="cnt-"+sec.id;
    sum.innerHTML = "<span>"+sec.t+"</span>";
    sum.appendChild(cnt);
    det.appendChild(sum);
    if(sec.intro){const p=document.createElement("p");p.className="seccion-intro";p.textContent=sec.intro;det.appendChild(p);}
    sec.items.forEach((it,i)=>{
      const id = sec.id+"-"+i;
      const st = estado[id] || {};
      const div = document.createElement("div");
      div.className = "item" + (st.s==="ok"?" estado-ok":st.s==="falla"?" estado-falla":"");
      div.id = "item-"+id;
      div.innerHTML =
        '<div class="item-top">'+
          '<div class="pills">'+
            '<button class="pill ok'+(st.s==="ok"?" activo":"")+'" onclick="setS(\''+id+'\',\'ok\')">✓ OK</button>'+
            '<button class="pill falla'+(st.s==="falla"?" activo":"")+'" onclick="setS(\''+id+'\',\'falla\')">✗ Falla</button>'+
          '</div>'+
          '<div class="item-body">'+
            '<div class="item-q">'+it.q+'</div>'+
            '<div class="item-c">👉 '+it.c+'</div>'+
          '</div>'+
        '</div>'+
        '<textarea class="nota" placeholder="¿Qué falló exactamente? Descríbelo aquí..." oninput="setNota(\''+id+'\',this.value)">'+(st.n||"")+'</textarea>';
      det.appendChild(div);
    });
    cont.appendChild(det);
  });
  const f=document.createElement("p");f.className="foot";f.textContent="Hecho para Ascenso Público · tu progreso se guarda automáticamente en este navegador.";
  cont.appendChild(f);
  actualizar();
}

function setS(id,s){
  const cur = estado[id]||{};
  cur.s = (cur.s===s)?null:s;
  estado[id]=cur; guardar();
  const it=document.getElementById("item-"+id);
  it.className="item"+(cur.s==="ok"?" estado-ok":cur.s==="falla"?" estado-falla":"");
  it.querySelectorAll(".pill").forEach(p=>p.classList.remove("activo"));
  if(cur.s) it.querySelector(".pill."+cur.s).classList.add("activo");
  actualizar();
}
function setNota(id,v){const cur=estado[id]||{};cur.n=v;estado[id]=cur;guardar();}
function guardar(){localStorage.setItem(KEY,JSON.stringify(estado));}

function actualizar(){
  let total=0,ok=0,falla=0;
  DATA.forEach(sec=>{
    let so=0,sf=0,st=sec.items.length;total+=st;
    sec.items.forEach((_,i)=>{const s=(estado[sec.id+"-"+i]||{}).s;if(s==="ok"){ok++;so++;}if(s==="falla"){falla++;sf++;}});
    const c=document.getElementById("cnt-"+sec.id);
    if(c) c.textContent=(so+sf)+"/"+st+(sf>0?" · "+sf+"✗":"");
  });
  const rev=ok+falla;
  document.getElementById("r-prog").textContent=rev+" / "+total+" revisados";
  document.getElementById("r-ok").textContent=ok;
  document.getElementById("r-falla").textContent=falla;
  document.getElementById("barra").style.width=(total?Math.round(rev/total*100):0)+"%";
}

function copiarFallas(){
  let out="REPORTE DE FALLAS — Checklist Ascenso Publico\\n\\n";
  let hay=false;
  DATA.forEach(sec=>{
    let bloque="";
    sec.items.forEach((it,i)=>{
      const st=estado[sec.id+"-"+i]||{};
      if(st.s==="falla"){hay=true;bloque+="  - "+it.q+(st.n?("  >> "+st.n):"")+"\\n";}
    });
    if(bloque) out+="["+sec.t+"]\\n"+bloque+"\\n";
  });
  if(!hay) out="No marcaste ninguna falla. Todo OK!";
  navigator.clipboard.writeText(out).then(()=>toast("Reporte copiado · pégalo en el chat con Kiro")).catch(()=>{prompt("Copia este reporte:",out);});
}
function resetear(){if(confirm("¿Borrar todo tu avance del checklist?")){estado={};guardar();render();toast("Checklist reiniciado");}}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}

render();
</script>
