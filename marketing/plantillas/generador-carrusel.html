<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Generador de carrusel — Ascenso Público</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0A2A5E;--gold:#FFC233;--teal:#16C2A3;--cream:#FBF9F4}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1118;color:#e7edf6;font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    display:flex;gap:24px;padding:20px;flex-wrap:wrap;justify-content:center;min-height:100vh}
  h1{font-size:16px;color:var(--gold);font-weight:800;width:100%;text-align:center;margin-bottom:6px}
  canvas{height:min(80vh,760px);width:auto;border-radius:16px;box-shadow:0 14px 40px rgba(0,0,0,.55);background:#000}
  .controls{width:340px;max-width:100%;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,194,51,.28);border-radius:16px;padding:18px;align-self:flex-start}
  label{display:block;font-size:12.5px;color:#9fb0c9;margin:12px 0 5px;font-weight:700}
  input,textarea,select{width:100%;background:#161d2b;border:1px solid #2d3a52;border-radius:9px;
    color:#e7edf6;padding:10px;font-family:inherit;font-size:14px}
  textarea{resize:vertical;min-height:64px}
  .row{display:flex;gap:10px}.row>*{flex:1}
  button{cursor:pointer;border:none;border-radius:11px;font-weight:800;font-family:inherit;
    font-size:15px;padding:13px;width:100%;margin-top:16px;background:var(--gold);color:var(--navy)}
  .hint{font-size:11.5px;color:#8194b0;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
  <h1>Generador de carrusel · 1080×1920 · descarga cada slide como PNG</h1>
  <canvas id="c" width="1080" height="1920"></canvas>
  <div class="controls">
    <div class="row">
      <div><label>Slide # (solo para el nombre del PNG)</label><input id="num" type="number" value="1" min="1"></div>
      <div><label>Tema</label><select id="tema"><option value="navy">Navy</option><option value="cream">Crema</option></select></div>
    </div>
    <label>Imagen de fondo (opcional, para portada)</label>
    <input type="file" id="bgimg" accept="image/*">
    <label>Etiqueta superior (kicker)</label>
    <input id="kicker" value="¿QUÉ HARÍAS?">
    <label>Título (opcional)</label>
    <textarea id="titulo"></textarea>
    <label>Texto / caso (opcional)</label>
    <textarea id="cuerpo">Eres servidor público. Un usuario, agradecido, te ofrece un regalo costoso por agilizar un trámite que ya estaba en curso.</textarea>
    <label>Opciones (1 por renglón, máx 4 · sin letra)</label>
    <textarea id="ops">Lo aceptas, igual el trámite iba a salir.
Lo rechazas y explicas que no puedes recibir dádivas.
Lo aceptas y lo reportas después.
Le pides que lo done a la oficina.</textarea>
    <div class="row">
      <div><label>Resaltar correcta</label><select id="ok"><option value="">Ninguna</option><option>A</option><option>B</option><option>C</option><option>D</option></select></div>
      <div><label>Pie (CTA / hint)</label><input id="pie" value="¿Cuál eliges? Desliza →"></div>
    </div>
    <button id="dl">⬇ Descargar este slide (PNG)</button>
    <div class="hint">Cambia los campos y descarga slide por slide (1, 2, 3…). Mantén textos
    cortos para que se lean bien en celular.</div>
  </div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=1080,Hh=1920;
const NAVY='#0A2A5E',GOLD='#FFC233',TEAL='#16C2A3',CREAM='#FBF9F4',CREAMBG='#F2EBDC';
const $=id=>document.getElementById(id);
const ids=['num','tema','kicker','titulo','cuerpo','ops','ok','pie'];
let bgImage=null;

function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function wrap(text,maxW,font){ctx.font=font;const out=[];text.split('\n').forEach(par=>{
  const words=par.split(/\s+/);let ln='';for(const w of words){const t=ln?ln+' '+w:w;
  if(ctx.measureText(t).width>maxW&&ln){out.push(ln);ln=w;}else ln=t;}out.push(ln);});return out;}
function logo(x,y,s){const m=(a,b)=>[x+a/100*s,y+b/100*s];
  ctx.fillStyle=TEAL;let p=m(24,74);ctx.globalAlpha=.7;ctx.beginPath();ctx.arc(p[0],p[1],3.6/100*s,0,7);ctx.fill();
  p=m(32,70);ctx.globalAlpha=1;ctx.beginPath();ctx.arc(p[0],p[1],4.4/100*s,0,7);ctx.fill();
  ctx.strokeStyle=GOLD;ctx.lineWidth=9.5/100*s;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();
  const cb=t=>{const P=[[34,66],[46,62],[56,54],[72,32]],u=1-t;return[u*u*u*P[0][0]+3*u*u*t*P[1][0]+3*u*t*t*P[2][0]+t*t*t*P[3][0],u*u*u*P[0][1]+3*u*u*t*P[1][1]+3*u*t*t*P[2][1]+t*t*t*P[3][1]];};
  for(let i=0;i<=40;i++){const c=cb(i/40),q=m(c[0],c[1]);i?ctx.lineTo(q[0],q[1]):ctx.moveTo(q[0],q[1]);}ctx.stroke();
  const h0=m(60,30),h1=m(75,28),h2=m(73,44);ctx.beginPath();ctx.moveTo(h0[0],h0[1]);ctx.lineTo(h1[0],h1[1]);ctx.lineTo(h2[0],h2[1]);ctx.stroke();}

function render(){
  const cream=$('tema').value==='cream',darkText=cream&&!bgImage;
  const ink=darkText?NAVY:CREAM, sub=darkText?'rgba(10,42,94,.6)':'rgba(251,249,244,.65)';
  if(cream){ctx.fillStyle=CREAMBG;ctx.fillRect(0,0,W,Hh);}
  else{const g=ctx.createRadialGradient(W/2,Hh*.4,80,W/2,Hh*.4,Hh*.62);
    g.addColorStop(0,'#16306b');g.addColorStop(.55,NAVY);g.addColorStop(1,'#07203f');ctx.fillStyle=g;ctx.fillRect(0,0,W,Hh);}
  if(bgImage){const ir=bgImage.width/bgImage.height,cr=W/Hh;let dw,dh;
    if(ir>cr){dh=Hh;dw=Hh*ir;}else{dw=W;dh=W/ir;}ctx.drawImage(bgImage,(W-dw)/2,(Hh-dh)/2,dw,dh);
    const ov=ctx.createLinearGradient(0,0,0,Hh);ov.addColorStop(0,'rgba(10,42,94,.45)');
    ov.addColorStop(1,'rgba(7,32,63,.92)');ctx.fillStyle=ov;ctx.fillRect(0,0,W,Hh);}
  // === HEADER (zona segura, bajo la barra de TikTok) ===
  const HY=310;
  logo(70,HY-55,110);ctx.fillStyle=ink;ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.font="800 36px 'Plus Jakarta Sans'";ctx.fillText('Ascenso Público',200,HY);
  ctx.fillStyle=sub;ctx.font="700 30px 'Plus Jakarta Sans'";ctx.textAlign='right';
  ctx.fillText('@ascensopublico',W-70,HY);

  // medir el contenido para centrarlo en la zona visible
  const kick=$('kicker').value.trim();
  const tit=$('titulo').value.trim();
  const body=$('cuerpo').value.trim();
  const ops=$('ops').value.split('\n').map(s=>s.trim()).filter(Boolean).slice(0,4);
  const correct=$('ok').value;
  const titLines=tit?wrap(tit,W-160,"700 78px 'Source Serif 4'"):[];
  const bodyLines=body?wrap(body,W-160,"500 46px 'Plus Jakarta Sans'"):[];
  const opData=ops.map(op=>{const l=wrap(op,W-300,"700 42px 'Plus Jakarta Sans'");return{l,h:Math.max(120,l.length*54+46)};});
  let H=0;
  if(kick)H+=70;
  if(titLines.length)H+=titLines.length*92+70;
  if(bodyLines.length)H+=bodyLines.length*64+(opData.length?40:0);
  opData.forEach(o=>H+=o.h+26);
  // centrar bloque en banda segura [480, 1240]
  const BT=480,BB=1240;
  let y=BT+Math.max(0,((BB-BT)-H)/2);

  if(kick){ctx.fillStyle=GOLD;ctx.font="800 38px 'Plus Jakarta Sans'";ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.fillText(kick.toUpperCase(),80,y);y+=70;}
  if(titLines.length){ctx.fillStyle=ink;ctx.textAlign='left';ctx.textBaseline='alphabetic';
    titLines.forEach(l=>{ctx.font="700 78px 'Source Serif 4'";ctx.fillText(l,80,y+64);y+=92;});
    ctx.strokeStyle=GOLD;ctx.lineWidth=9;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(84,y+24);ctx.lineTo(264,y+24);ctx.stroke();y+=70;}
  if(bodyLines.length){ctx.fillStyle=ink;ctx.textAlign='left';
    bodyLines.forEach(l=>{ctx.font="500 46px 'Plus Jakarta Sans'";ctx.fillText(l,80,y+44);y+=64;});
    if(opData.length)y+=40;}
  opData.forEach((o,i)=>{const letter='ABCD'[i];const bh=o.h,x=70,bw=W-140,isOk=correct===letter;
    ctx.fillStyle=isOk?'rgba(22,194,163,.22)':'rgba(255,255,255,.06)';
    ctx.strokeStyle=isOk?TEAL:'rgba(255,194,51,.5)';ctx.lineWidth=isOk?6:3;rr(x,y,bw,bh,26);ctx.fill();ctx.stroke();
    ctx.fillStyle=isOk?TEAL:GOLD;ctx.beginPath();ctx.arc(x+62,y+bh/2,40,0,7);ctx.fill();
    ctx.fillStyle=NAVY;ctx.font="800 42px 'Plus Jakarta Sans'";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(letter,x+62,y+bh/2+2);
    ctx.fillStyle=ink;ctx.textAlign='left';ctx.font="700 42px 'Plus Jakarta Sans'";
    const ty=y+bh/2-(o.l.length-1)*27;o.l.forEach((l,k)=>ctx.fillText(l,x+128,ty+k*54));
    if(isOk){ctx.fillStyle=TEAL;ctx.font="800 44px 'Plus Jakarta Sans'";ctx.textAlign='right';ctx.fillText('✓',x+bw-30,y+bh/2+2);}
    y+=bh+26;});
  // === PIE (zona segura inferior, lejos de la franja de comentarios) ===
  const pie=$('pie').value.trim();
  if(pie){ctx.font="800 38px 'Plus Jakarta Sans'";ctx.textBaseline='middle';const tw=ctx.measureText(pie).width;
    const padX=40,h=84,w=tw+padX*2,x=W/2-w/2,py=1300;
    ctx.fillStyle=GOLD;rr(x,py,w,h,h/2);ctx.fill();
    ctx.fillStyle=NAVY;ctx.textAlign='center';ctx.fillText(pie,W/2,py+h/2+1);}
}
async function boot(){try{await document.fonts.load("700 78px 'Source Serif 4'");
  await document.fonts.load("800 42px 'Plus Jakarta Sans'");await document.fonts.ready;}catch(e){}render();}
ids.forEach(id=>$(id).addEventListener('input',render));
$('bgimg').addEventListener('change',e=>{const f=e.target.files[0];if(!f){bgImage=null;render();return;}
  const img=new Image();img.onload=()=>{bgImage=img;render();};img.src=URL.createObjectURL(f);});
$('dl').onclick=()=>{render();cv.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='carrusel-slide-'+$('num').value+'.png';a.click();URL.revokeObjectURL(a.href);},'image/png');};
boot();
</script>
</body>
</html>
