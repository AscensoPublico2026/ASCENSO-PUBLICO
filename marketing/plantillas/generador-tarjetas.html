<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Generador de tarjetas y portadas — Ascenso Público</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#0A2A5E;--gold:#FFC233;--teal:#16C2A3;--cream:#FBF9F4}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d1118;color:#e7edf6;font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    display:flex;gap:24px;padding:20px;flex-wrap:wrap;justify-content:center;min-height:100vh}
  h1{font-size:16px;color:var(--gold);font-weight:800;width:100%;text-align:center;margin-bottom:6px}
  canvas{height:min(80vh,760px);width:auto;border-radius:16px;box-shadow:0 14px 40px rgba(0,0,0,.55);background:#000}
  .controls{width:330px;max-width:100%;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,194,51,.28);border-radius:16px;padding:18px;align-self:flex-start}
  label{display:block;font-size:12.5px;color:#9fb0c9;margin:12px 0 5px;font-weight:700}
  input,textarea,select{width:100%;background:#161d2b;border:1px solid #2d3a52;border-radius:9px;
    color:#e7edf6;padding:10px;font-family:inherit;font-size:14px}
  textarea{resize:vertical;min-height:70px}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .chk{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;color:#cdd6e6}
  .chk input{width:auto}
  button{cursor:pointer;border:none;border-radius:11px;font-weight:800;font-family:inherit;
    font-size:15px;padding:13px;width:100%;margin-top:16px;background:var(--gold);color:var(--navy)}
  .hint{font-size:11.5px;color:#8194b0;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
  <h1>Generador de tarjetas y portadas · 1080×1920 (9:16)</h1>
  <canvas id="c" width="1080" height="1920"></canvas>
  <div class="controls">
    <label>Tipo</label>
    <select id="preset">
      <option value="portada">Portada (miniatura del perfil)</option>
      <option value="hook">Tarjeta-gancho (inicio del video)</option>
      <option value="fechas">Tarjeta de fechas</option>
    </select>
    <div class="row">
      <div><label>Tema</label>
        <select id="tema"><option value="navy">Navy</option><option value="cream">Crema</option></select></div>
      <div><label>@usuario</label><input id="handle" value="@ascensopublico"></div>
    </div>
    <label>Etiqueta superior (kicker)</label>
    <input id="kicker" value="CONVOCATORIA CNSC">
    <label>Título</label>
    <textarea id="titulo">¿Quieres una de las 3.044 vacantes?</textarea>
    <label>Cuerpo (una línea por renglón · en fechas usa "Etiqueta: dato")</label>
    <textarea id="cuerpo">Ascenso: 18–25 jun
Abierto general: 15–31 jun
Abierto c/ reserva: 2–9 jul</textarea>
    <label>Chip de cargo (opcional)</label>
    <input id="chip" placeholder="Ej: Técnico Operativo">
    <div class="chk"><input type="checkbox" id="zonas"><label for="zonas" style="margin:0">Mostrar zonas seguras de TikTok</label></div>
    <button id="dl">⬇ Descargar PNG</button>
    <div class="hint">Portada = la imagen que se ve en tu perfil/búsqueda. Mantén el texto en el
    centro (lo de arriba, abajo y la derecha lo tapa la interfaz de TikTok). Activa "zonas seguras" para verlo.</div>
  </div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=1080,Hh=1920;
const NAVY='#0A2A5E',GOLD='#FFC233',TEAL='#16C2A3',CREAM='#FBF9F4';
const $=id=>document.getElementById(id);
const ids=['preset','tema','handle','kicker','titulo','cuerpo','chip','zonas'];

function wrap(text,maxW,font){ctx.font=font;const words=text.split(/\s+/);const lines=[];let ln='';
  for(const w of words){const t=ln?ln+' '+w:w;if(ctx.measureText(t).width>maxW&&ln){lines.push(ln);ln=w;}else ln=t;}
  if(ln)lines.push(ln);return lines;}
function pill(cx,y,txt,font){ctx.font=font;const tw=ctx.measureText(txt).width,padX=34,h=68,w=tw+padX*2,x=cx-w/2,r=h/2;
  ctx.fillStyle='rgba(255,194,51,.12)';ctx.strokeStyle=GOLD;ctx.lineWidth=3;ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle=GOLD;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(txt,cx,y+h/2+1);return y+h;}
function logo(x,y,s,light){const m=(a,b)=>[x+a/100*s,y+b/100*s];
  ctx.fillStyle=TEAL;let p=m(24,74);ctx.globalAlpha=.7;ctx.beginPath();ctx.arc(p[0],p[1],3.6/100*s,0,7);ctx.fill();
  p=m(32,70);ctx.globalAlpha=1;ctx.beginPath();ctx.arc(p[0],p[1],4.4/100*s,0,7);ctx.fill();
  ctx.strokeStyle=GOLD;ctx.lineWidth=9.5/100*s;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();const cb=t=>{const P=[[34,66],[46,62],[56,54],[72,32]],u=1-t;
    return[u*u*u*P[0][0]+3*u*u*t*P[1][0]+3*u*t*t*P[2][0]+t*t*t*P[3][0],
           u*u*u*P[0][1]+3*u*u*t*P[1][1]+3*u*t*t*P[2][1]+t*t*t*P[3][1]];};
  for(let i=0;i<=40;i++){const c=cb(i/40),q=m(c[0],c[1]);i?ctx.lineTo(q[0],q[1]):ctx.moveTo(q[0],q[1]);}ctx.stroke();
  const h0=m(60,30),h1=m(75,28),h2=m(73,44);ctx.beginPath();ctx.moveTo(h0[0],h0[1]);ctx.lineTo(h1[0],h1[1]);ctx.lineTo(h2[0],h2[1]);ctx.stroke();}

function zonas(){ctx.save();ctx.fillStyle='rgba(255,60,60,.18)';ctx.fillRect(0,0,W,150);
  ctx.fillRect(0,Hh-430,W,430);ctx.fillRect(W-150,Hh-980,150,560);
  ctx.fillStyle='#fff';ctx.font="700 30px 'Plus Jakarta Sans'";ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('evita texto aquí',W/2,Hh-300);ctx.restore();}

function render(){
  const preset=$('preset').value,cream=$('tema').value==='cream';
  const ink=cream?NAVY:CREAM, sub=cream?'rgba(10,42,94,.7)':'rgba(251,249,244,.8)';
  // fondo
  if(cream){ctx.fillStyle=CREAM;ctx.fillRect(0,0,W,Hh);}
  else{const g=ctx.createRadialGradient(W/2,Hh*.4,80,W/2,Hh*.4,Hh*.62);
    g.addColorStop(0,'#16306b');g.addColorStop(.55,NAVY);g.addColorStop(1,'#07203f');ctx.fillStyle=g;ctx.fillRect(0,0,W,Hh);}
  // marca arriba
  logo(70,90,120);
  ctx.fillStyle=ink;ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.font="800 38px 'Plus Jakarta Sans'";ctx.fillText('Ascenso Público',210,150);
  ctx.fillStyle=sub;ctx.font="500 30px 'Plus Jakarta Sans'";ctx.textAlign='right';ctx.fillText($('handle').value,W-70,150);

  // kicker
  const kick=$('kicker').value.trim();
  // título
  const titleFont=preset==='fechas'?"700 70px 'Source Serif 4'":"700 96px 'Source Serif 4'";
  const tlines=wrap($('titulo').value,W-160,titleFont);
  const lh=preset==='fechas'?86:108;

  if(preset==='fechas'){
    let y=430;
    if(kick){ctx.fillStyle=GOLD;ctx.font="800 34px 'Plus Jakarta Sans'";ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(kick.toUpperCase(),W/2,y);y+=70;}
    ctx.fillStyle=ink;ctx.font=titleFont;ctx.textAlign='center';
    tlines.forEach(l=>{ctx.fillText(l,W/2,y);y+=lh;});
    y+=40;
    $('cuerpo').value.split('\n').filter(s=>s.trim()).slice(0,4).forEach(line=>{
      const idx=line.indexOf(':');const lab=idx>=0?line.slice(0,idx+1):line;const val=idx>=0?line.slice(idx+1).trim():'';
      // bullet
      ctx.fillStyle=GOLD;ctx.beginPath();ctx.arc(140,y,11,0,7);ctx.fill();
      ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillStyle=ink;ctx.font="700 50px 'Plus Jakarta Sans'";ctx.fillText(lab,180,y);
      const lw=ctx.measureText(lab+' ').width;ctx.fillStyle=GOLD;ctx.font="800 50px 'Plus Jakarta Sans'";
      ctx.fillText(val,180+lw,y);y+=130;});
  } else {
    // portada / hook: centrado vertical en zona segura
    let blockH=tlines.length*lh + (kick?70:0) + ($('chip').value.trim()?110:0);
    let y=(Hh-blockH)/2 - 40;
    if(kick){ctx.fillStyle=GOLD;ctx.font="800 38px 'Plus Jakarta Sans'";ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(kick.toUpperCase(),W/2,y);y+=80;}
    ctx.fillStyle=ink;ctx.font=titleFont;ctx.textAlign='center';
    tlines.forEach(l=>{ctx.fillText(l,W/2,y);y+=lh;});
    // subrayado dorado
    ctx.strokeStyle=GOLD;ctx.lineWidth=10;ctx.lineCap='round';ctx.beginPath();
    ctx.moveTo(W/2-110,y-lh+70);ctx.lineTo(W/2+110,y-lh+70);ctx.stroke();
    const chip=$('chip').value.trim();
    if(chip){y+=40;pill(W/2,y,chip,"800 40px 'Plus Jakarta Sans'");}
  }
  if($('zonas').checked)zonas();
}
async function boot(){try{await document.fonts.load("700 96px 'Source Serif 4'");
  await document.fonts.load("800 40px 'Plus Jakarta Sans'");await document.fonts.ready;}catch(e){}render();}
ids.forEach(id=>$(id).addEventListener('input',render));
$('dl').onclick=()=>{render();cv.toBlob(b=>{const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='ascenso-'+$('preset').value+'.png';a.click();
  URL.revokeObjectURL(a.href);},'image/png');};
boot();
</script>
</body>
</html>
