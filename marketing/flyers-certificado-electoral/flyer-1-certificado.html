<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer 1 - Certificado Electoral</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A2A5E;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .flyer {
            width: 1080px;
            height: 960px;
            background: linear-gradient(135deg, #0A2A5E 0%, #0D3470 40%, #0A2A5E 100%);
            border-radius: 24px;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        /* Decorative elements */
        .flyer::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(232, 163, 61, 0.15) 0%, transparent 70%);
            border-radius: 50%;
        }

        .flyer::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(232, 163, 61, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header {
            text-align: center;
            z-index: 2;
        }

        .header .tag {
            display: inline-block;
            background: #E8A33D;
            color: #0A2A5E;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 22px;
            padding: 8px 24px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-family: 'Source Serif 4', serif;
            font-weight: 900;
            font-size: 52px;
            color: #FFFFFF;
            line-height: 1.1;
            margin-bottom: 10px;
        }

        .header h1 span {
            color: #E8A33D;
        }

        .header p {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
            font-size: 24px;
            color: rgba(255, 255, 255, 0.8);
        }

        .certificado-container {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            margin: 30px 0;
        }

        .certificado-frame {
            width: 750px;
            height: 500px;
            background: #FBF9F4;
            border-radius: 16px;
            border: 4px solid #E8A33D;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(232, 163, 61, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .certificado-frame .placeholder {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 28px;
            color: #0A2A5E;
            text-align: center;
            opacity: 0.5;
            padding: 40px;
        }

        .certificado-frame .placeholder span {
            display: block;
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
            opacity: 0.7;
        }

        /* Si quieres poner la imagen real, descomenta esto y comenta el placeholder */
        /*
        .certificado-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        */

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 2;
        }

        .footer .logo-text {
            font-family: 'Source Serif 4', serif;
            font-weight: 700;
            font-size: 22px;
            color: #E8A33D;
        }

        .footer .separator {
            width: 2px;
            height: 24px;
            background: rgba(255, 255, 255, 0.3);
        }

        .footer .url {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="flyer">
        <div class="header">
            <div class="tag">Concursos CNSC</div>
            <h1>Guarda tu <span>Certificado Electoral</span></h1>
            <p>Este documento puede definir si ganas o pierdes un concurso</p>
        </div>

        <div class="certificado-container">
            <div class="certificado-frame">
                <!-- OPCION 1: Placeholder (reemplazar con imagen real) -->
                <div class="placeholder">
                    AQUI VA TU FOTO DEL CERTIFICADO ELECTORAL
                    <span>Reemplaza este div con una etiqueta &lt;img&gt;</span>
                </div>

                <!-- OPCION 2: Imagen real (descomenta y pon la ruta de tu imagen) -->
                <!-- <img src="certificado-electoral.jpg" alt="Certificado Electoral"> -->
            </div>
        </div>

        <div class="footer">
            <span class="logo-text">Ascenso Publico</span>
            <span class="separator"></span>
            <span class="url">ascensopublico.com</span>
        </div>
    </div>
</body>
</html>
