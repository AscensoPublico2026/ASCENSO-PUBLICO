<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Fondo: gradiente navy sutil, más claro arriba-izquierda, más oscuro abajo-derecha -->
    <linearGradient id="bgNavy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#123A73"/>
      <stop offset="0.55" stop-color="#0A2A5E"/>
      <stop offset="1" stop-color="#071D45"/>
    </linearGradient>

    <!-- Halo suave detrás del logo -->
    <radialGradient id="halo" cx="50%" cy="46%" r="42%">
      <stop offset="0" stop-color="#1A4A8A" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#1A4A8A" stop-opacity="0"/>
    </radialGradient>

    <!-- Dorado de la marca -->
    <linearGradient id="apGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFC233"/>
      <stop offset="1" stop-color="#E8A33D"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1920" height="1080" fill="url(#bgNavy)"/>

  <!-- Halo detrás del logo -->
  <rect width="1920" height="1080" fill="url(#halo)"/>

  <!-- Puntos decorativos sutiles (textura, no distraen) -->
  <g fill="#F6C56B" opacity="0.06">
    <circle cx="180" cy="150" r="4"/>
    <circle cx="1740" cy="180" r="5"/>
    <circle cx="220" cy="900" r="3"/>
    <circle cx="1700" cy="920" r="4"/>
    <circle cx="960" cy="90" r="3"/>
    <circle cx="960" cy="990" r="3"/>
    <circle cx="120" cy="540" r="3"/>
    <circle cx="1800" cy="540" r="3"/>
  </g>

  <!-- ===== Logo mark (flecha ascendente), centrado ===== -->
  <g transform="translate(960, 470)">
    <g transform="translate(-100, -100) scale(2)">
      <circle cx="26" cy="74" r="3.4" fill="#0A2A5E" opacity="0.0"/>
      <!-- puntos de la flecha (más visibles sobre fondo navy: dorado) -->
      <circle cx="26" cy="74" r="3.6" fill="#F6C56B" opacity="0.55"/>
      <circle cx="34" cy="70" r="4.4" fill="#F6C56B" opacity="0.85"/>
      <path d="M36 66 C48 62 58 54 72 34" fill="none" stroke="url(#apGold)" stroke-width="9" stroke-linecap="round"/>
      <path d="M61 32 L75 30 L73 45" fill="none" stroke="url(#apGold)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ===== Nombre de la marca ===== -->
  <text x="960" y="660" text-anchor="middle"
        font-family="'Source Serif 4', Georgia, 'Times New Roman', serif"
        font-size="72" font-weight="700" fill="#FBF9F4" letter-spacing="1">
    Ascenso P&#250;blico
  </text>

  <!-- ===== Línea/slogan ===== -->
  <text x="960" y="706" text-anchor="middle"
        font-family="'Plus Jakarta Sans', Arial, Helvetica, sans-serif"
        font-size="24" font-weight="500" fill="#C9D4E6" letter-spacing="3">
    TU RUTA HACIA EL EMPLEO P&#218;BLICO
  </text>

  <!-- Línea decorativa dorada -->
  <rect x="890" y="736" width="140" height="3" rx="1.5" fill="url(#apGold)"/>
</svg>
