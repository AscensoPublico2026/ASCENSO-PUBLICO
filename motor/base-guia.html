<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="icon" type="image/svg+xml" href="../brand/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
:root{
  --azul:#0A2A5E; --azul-medio:#1A4A8A; --azul-claro:#2D6CC0; --azul-suave:#EAF1FB; --azul-borde:#C9DCF4;
  --oro:#E8A33D; --oro-claro:#F6C56B; --oro-suave:#FDF4E3; --oro-borde:#F0DCB0;
  --crema:#FBF9F4; --blanco:#FFFFFF; --gris-bg:#F2F0EA; --gris-borde:#E6E2D8;
  --verde:#1A7A4A; --verde-suave:#E8F6EE; --verde-borde:#BFE6CF;
  --rojo:#C0392B; --rojo-suave:#FCEDEB; --rojo-borde:#F2CDC8;
  --ambar:#B8600A; --ambar-suave:#FBEFDD; --ambar-borde:#EFD7B0;
  --texto:#2A3441; --texto-suave:#5B6675;
  --sombra:0 4px 20px rgba(10,42,94,0.08); --sombra-lg:0 10px 36px rgba(10,42,94,0.16); --radio:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--crema);color:var(--texto);line-height:1.7;-webkit-font-smoothing:antialiased;}
#readbar{position:fixed;top:0;left:0;height:4px;width:0%;background:linear-gradient(90deg,var(--oro),var(--oro-claro));z-index:999;transition:width .1s linear;}
header{background:linear-gradient(140deg,#08234F 0%,var(--azul) 45%,var(--azul-medio) 100%);color:var(--blanco);padding:42px 20px 36px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(232,163,61,0.22),transparent 70%);}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--oro) 0%,var(--oro-claro) 50%,var(--oro) 100%);}
.brand{display:inline-flex;align-items:center;gap:13px;position:relative;z-index:2;}
.brand-logo{width:50px;height:50px;border-radius:13px;background:linear-gradient(135deg,var(--oro-claro),var(--oro));display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(232,163,61,0.4);}
.brand-name{font-size:1.6rem;font-weight:800;}
.brand-slogan{font-size:0.82rem;color:rgba(255,255,255,0.78);margin-top:4px;}
.doc-ref{position:absolute;top:16px;right:18px;z-index:3;font-size:0.68rem;font-weight:700;letter-spacing:0.16em;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.22);padding:4px 11px;border-radius:7px;text-transform:uppercase;}
.kicker{display:inline-flex;align-items:center;gap:11px;margin:24px 0 12px;position:relative;z-index:2;color:var(--oro-claro);font-weight:700;font-size:0.78rem;letter-spacing:0.2em;text-transform:uppercase;}
.kicker::before,.kicker::after{content:'';width:26px;height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--oro),transparent);}
header h1{font-family:'Source Serif 4',serif;font-size:clamp(1.7rem,4.5vw,2.6rem);font-weight:700;line-height:1.16;max-width:760px;margin:0 auto;position:relative;z-index:2;}
.header-sub{max-width:620px;margin:18px auto 0;position:relative;z-index:2;color:rgba(255,255,255,0.82);font-size:0.98rem;}
.badges{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;position:relative;z-index:2;}
.badge{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:0.8rem;font-weight:600;padding:7px 14px;border-radius:20px;}
nav{position:sticky;top:0;z-index:50;background:var(--azul);display:flex;gap:5px;padding:11px 12px;overflow-x:auto;box-shadow:0 4px 18px rgba(10,42,94,0.22);}
nav button{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.78);border:none;padding:9px 16px;border-radius:9px;cursor:pointer;font-weight:600;white-space:nowrap;font-family:inherit;font-size:.85rem;}
nav button:hover{background:rgba(255,255,255,0.16);color:#fff;}
nav button.active{background:linear-gradient(135deg,var(--oro),var(--oro-claro));color:var(--azul);box-shadow:0 4px 12px rgba(232,163,61,0.4);}
main{max-width:880px;margin:0 auto;padding:36px 18px 80px;}
.section{display:none;animation:fade .4s ease;}
.section.visible{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--ambar);font-weight:700;font-size:0.78rem;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:12px;}
.eyebrow::before{content:'';width:26px;height:3px;background:linear-gradient(90deg,var(--oro),var(--oro-claro));border-radius:3px;}
h2.sec-title{font-family:'Source Serif 4',serif;font-size:clamp(1.55rem,3.6vw,2.1rem);color:var(--azul);line-height:1.2;margin-bottom:20px;}
p{margin-bottom:12px;}
.card{background:#fff;border:1px solid var(--gris-borde);border-radius:var(--radio);padding:20px 22px;box-shadow:var(--sombra);margin:14px 0;}
.card-lead{border-left:5px solid var(--oro);}
.lista{list-style:none;margin:10px 0;}
.lista li{position:relative;padding-left:26px;margin-bottom:8px;}
.lista li::before{content:'✓';position:absolute;left:0;color:var(--verde);font-weight:800;}
.concepto{background:var(--blanco);border:1px solid var(--oro-borde);border-radius:var(--radio);margin:18px 0;box-shadow:var(--sombra);overflow:hidden;}
.concepto-head{background:linear-gradient(100deg,var(--oro-suave),var(--blanco) 80%);padding:16px 22px;font-size:1.08rem;font-weight:700;color:var(--azul);display:flex;align-items:center;gap:11px;border-bottom:1px dashed var(--oro);}
.ch-icon{font-size:1.4rem;}
.concepto-body{display:grid;grid-template-columns:1fr;gap:12px;padding:20px 22px;}
@media(min-width:700px){.concepto-body{grid-template-columns:1fr 1fr;}}
.capa{display:flex;gap:12px;padding:14px 16px;background:var(--gris-bg);border-radius:12px;border:1px solid var(--gris-borde);transition:transform .18s;}
.capa:hover{transform:translateY(-2px);}
.capa-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.25rem;}
.capa-icon.def{background:var(--azul-suave);}
.capa-icon.apl{background:var(--verde-suave);}
.capa-icon.eje{background:var(--oro-suave);}
.capa-icon.cnsc{background:var(--rojo-suave);}
.capa-content .label{display:block;font-size:0.7rem;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;}
.capa.cap-def .label{color:var(--azul-claro);}
.capa.cap-apl .label{color:var(--verde);}
.capa.cap-eje .label{color:var(--ambar);}
.capa.cap-cnsc .label{color:var(--rojo);}
.capa-content p{font-size:0.9rem;margin:0;}
.full{grid-column:1/-1;}
.sub-bloques{display:flex;flex-direction:column;gap:10px;margin-top:14px;grid-column:1/-1;}
.sb{border:1.5px solid var(--gris-borde);border-radius:12px;background:var(--blanco);overflow:hidden;}
.sb summary{padding:13px 18px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:10px;list-style:none;user-select:none;}
.sb summary::-webkit-details-marker{display:none;}
.sb summary::after{content:'▾';margin-left:auto;transition:transform .2s;}
.sb[open] summary::after{transform:rotate(180deg);}
.sb-violeta summary{background:#F5F0FB;color:#5B3F8C;border-left:5px solid #8B6BC9;}
.sb-oro summary{background:var(--oro-suave);color:var(--ambar);border-left:5px solid var(--oro);}
.sb-verde summary{background:var(--verde-suave);color:var(--verde);border-left:5px solid var(--verde);}
.sb-azul summary{background:var(--azul-suave);color:var(--azul);border-left:5px solid var(--azul-claro);}
.sb-body{padding:16px 20px;}
.box{border-radius:13px;padding:18px 20px;margin:16px 0;border:1px solid;}
.box-title{font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.box p{margin-bottom:0;}
.box.info{background:var(--azul-suave);border-color:var(--azul-borde);}
.box.info .box-title{color:var(--azul);}
.box.ok{background:var(--verde-suave);border-color:var(--verde-borde);}
.box.ok .box-title{color:var(--verde);}
.box.warn{background:var(--ambar-suave);border-color:var(--ambar-borde);}
.box.warn .box-title{color:var(--ambar);}
.box.danger{background:var(--rojo-suave);border-color:var(--rojo-borde);}
.box.danger .box-title{color:var(--rojo);}
.box.gold{background:var(--oro-suave);border-color:var(--oro-borde);}
.box.gold .box-title{color:var(--ambar);}
.tabla-wrap{overflow-x:auto;margin:12px 0;}
table{width:100%;border-collapse:collapse;font-size:.85rem;background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--sombra);}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--gris-borde);vertical-align:top;}
th{background:var(--azul);color:#fff;font-size:.76rem;text-transform:uppercase;letter-spacing:.04em;}
tr:last-child td{border-bottom:none;}
.caso{background:var(--blanco);border:1px solid var(--gris-borde);border-radius:14px;overflow:hidden;margin:16px 0;box-shadow:var(--sombra);}
.caso-head{background:linear-gradient(135deg,var(--azul),var(--azul-medio));color:#fff;padding:13px 18px;font-weight:700;}
.caso-body{padding:18px 20px;}
.caso-body .label{font-weight:800;color:var(--ambar);display:block;margin-top:14px;margin-bottom:3px;font-size:0.76rem;text-transform:uppercase;letter-spacing:0.06em;}
.caso-body .label:first-child{margin-top:0;}
.resp-correcta{background:var(--verde-suave);border-left:4px solid var(--verde);padding:11px 15px;border-radius:9px;margin-top:8px;}
.trampa{background:#fff;border:1px solid var(--rojo-borde);border-radius:14px;overflow:hidden;margin:14px 0;box-shadow:var(--sombra);}
.trampa-q{background:var(--rojo-suave);color:var(--rojo);font-weight:700;padding:13px 16px;font-size:.92rem;}
.trampa-detail{padding:14px 16px;display:flex;flex-direction:column;gap:8px;}
.t-row{padding:9px 12px;border-radius:8px;font-size:.86rem;}
.t-row.parece{background:var(--ambar-suave);border-left:4px solid var(--oro);}
.t-row.malo{background:var(--rojo-suave);border-left:4px solid var(--rojo);}
.t-row.bueno{background:var(--verde-suave);border-left:4px solid var(--verde);}
.flashcard-wrap{max-width:560px;margin:24px auto;perspective:1200px;}
.flashcard{position:relative;height:240px;transform-style:preserve-3d;transition:transform .5s;cursor:pointer;}
.flashcard.flipped{transform:rotateY(180deg);}
.flash-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radio);padding:28px;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--sombra-lg);text-align:center;}
.flash-front{background:linear-gradient(135deg,var(--oro-suave),var(--blanco));border:2px solid var(--oro);}
.flash-back{background:linear-gradient(135deg,var(--azul),var(--azul-medio));color:#fff;transform:rotateY(180deg);}
.flash-tag{font-size:0.7rem;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;margin-bottom:12px;color:var(--ambar);}
.flash-back .flash-tag{color:var(--oro-claro);}
.flash-face p{font-size:1.05rem;margin:0;}
.flash-hint{margin-top:14px;font-size:.76rem;color:var(--texto-suave);}
.flash-controls{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap;}
.flash-controls button{background:var(--blanco);border:1.5px solid var(--gris-borde);color:var(--azul);padding:9px 16px;border-radius:9px;cursor:pointer;font-weight:700;font-size:0.84rem;font-family:inherit;}
.flash-controls span{font-size:.82rem;color:var(--texto-suave);font-weight:600;}
.resumen{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin:16px 0;}
.resumen-item{background:#fff;border:1px solid var(--gris-borde);border-top:3px solid var(--oro);border-radius:12px;padding:16px;box-shadow:var(--sombra);}
.resumen-item h4{font-family:'Plus Jakarta Sans',sans-serif;color:var(--azul);font-size:.95rem;margin-bottom:5px;}
.resumen-item p{font-size:.85rem;color:var(--texto-suave);margin:0;}
.glosario{margin:16px 0;}
.glosario dt{font-weight:800;color:var(--azul);margin-top:10px;}
.glosario dd{font-size:.88rem;color:var(--texto-suave);}
.quiz-intro{text-align:center;}
.dific-tags{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:14px;}
.tag{font-size:0.75rem;font-weight:700;padding:5px 14px;border-radius:20px;}
.tag.b{background:var(--verde-suave);color:var(--verde);}
.tag.i{background:var(--azul-suave);color:var(--azul);}
.tag.a{background:var(--rojo-suave);color:var(--rojo);}
.pregunta{background:var(--blanco);border:1px solid var(--gris-borde);border-radius:14px;padding:21px 22px;margin-bottom:16px;box-shadow:var(--sombra);}
.q-num{display:inline-flex;align-items:center;gap:9px;font-weight:800;color:var(--azul);margin-bottom:5px;}
.nivel-pill{font-size:0.66rem;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.nivel-pill.b{background:var(--verde-suave);color:var(--verde);}
.nivel-pill.i{background:var(--azul-suave);color:var(--azul);}
.nivel-pill.a{background:var(--rojo-suave);color:var(--rojo);}
.q-contexto{background:var(--azul-suave);border-left:4px solid var(--azul-claro);padding:11px 14px;border-radius:9px;font-size:0.88rem;margin:9px 0;}
.q-texto{font-weight:600;margin:9px 0 15px;}
.opciones{display:flex;flex-direction:column;gap:9px;}
.opcion{display:flex;align-items:flex-start;gap:12px;border:1.5px solid var(--gris-borde);border-radius:11px;padding:13px 15px;cursor:pointer;transition:all .18s;background:#fff;}
.opcion:hover{border-color:var(--oro);background:var(--oro-suave);}
.opcion .letra{width:27px;height:27px;border-radius:50%;background:var(--gris-bg);color:var(--texto-suave);font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.opcion.correcta{border-color:var(--verde);background:var(--verde-suave);}
.opcion.correcta .letra{background:var(--verde);color:#fff;}
.opcion.incorrecta{border-color:var(--rojo);background:var(--rojo-suave);}
.opcion.incorrecta .letra{background:var(--rojo);color:#fff;}
.opcion.bloqueada{pointer-events:none;}
.op-body{display:flex;flex-direction:column;flex:1;}
.op-txt{display:block;}
.op-exp{display:none;margin-top:9px;font-size:.82rem;line-height:1.55;padding:9px 12px;border-radius:8px;}
.op-exp.show{display:block;}
.op-exp.ok{background:var(--verde-suave);color:#155e38;border-left:3px solid var(--verde);}
.op-exp.no{background:var(--rojo-suave);color:#8e2b20;border-left:3px solid var(--rojo);}
.feedback{margin-top:12px;padding:12px 15px;border-radius:10px;font-size:0.88rem;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:var(--verde-suave);border-left:4px solid var(--verde);}
.feedback.no{background:var(--rojo-suave);border-left:4px solid var(--rojo);}
#resultado{display:none;text-align:center;background:var(--blanco);border:2px solid var(--oro);border-radius:18px;padding:32px;margin-top:24px;box-shadow:var(--sombra-lg);}
#resultado.show{display:block;}
.score-num{font-size:3.2rem;font-weight:800;color:var(--azul);font-family:'Source Serif 4',serif;}
.btn{background:linear-gradient(135deg,var(--azul),var(--azul-medio));color:#fff;border:none;padding:13px 30px;border-radius:11px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.95rem;}
.btn.gold{background:linear-gradient(135deg,var(--oro),var(--oro-claro));color:var(--azul);}
.advance-bar{margin-top:36px;padding-top:22px;border-top:2px dashed var(--oro);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.advance-hint{color:var(--texto-suave);font-style:italic;font-size:.9rem;}
.advance-btn{background:linear-gradient(135deg,var(--oro),var(--oro-claro));color:var(--azul);border:none;padding:12px 26px;border-radius:11px;font-weight:800;cursor:pointer;box-shadow:0 4px 12px rgba(232,163,61,0.35);transition:all .2s;font-family:inherit;}
.advance-btn:hover{transform:translateY(-2px);box-shadow:var(--sombra-lg);}
.advance-btn.final{background:linear-gradient(135deg,var(--verde),#2A9F66);color:#fff;}
.narr{background:linear-gradient(135deg,var(--azul-suave),var(--blanco));border-left:5px solid var(--azul-claro);border-radius:14px;padding:18px 20px;margin:16px 0;font-size:1rem;}
.narr .narr-tag{display:block;font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--azul-claro);margin-bottom:6px;}
.narr p:last-child{margin-bottom:0;}
.flujo{display:flex;flex-wrap:wrap;gap:18px 10px;align-items:stretch;margin:22px 0;}
.flujo-paso{flex:1;min-width:130px;background:var(--blanco);border:1.5px solid var(--azul-borde);border-radius:12px;padding:14px;text-align:center;position:relative;box-shadow:var(--sombra);}
.flujo-paso .fp-n{display:inline-flex;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--azul),var(--azul-medio));color:#fff;font-weight:800;align-items:center;justify-content:center;font-size:.82rem;margin-bottom:8px;}
.flujo-paso h4{font-family:'Plus Jakarta Sans',sans-serif;font-size:.84rem;color:var(--azul);margin-bottom:4px;}
.flujo-paso p{font-size:.76rem;color:var(--texto-suave);margin:0;}
.flujo-paso:not(:last-child)::after{content:'→';position:absolute;right:-13px;top:50%;transform:translateY(-50%);color:var(--oro);font-weight:800;font-size:1.1rem;z-index:2;}
@media(max-width:620px){.flujo-paso:not(:last-child)::after{content:'↓';right:50%;top:auto;bottom:-16px;transform:translateX(50%);}}
.checkpoint{background:var(--oro-suave);border:1.5px dashed var(--oro);border-radius:14px;padding:18px 20px;margin:20px 0;}
.cp-tag{font-weight:800;color:var(--ambar);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.cp-q{font-weight:600;margin-bottom:12px;}
.cp-opts{display:flex;flex-direction:column;gap:8px;}
.cp-opt{text-align:left;background:#fff;border:1.5px solid var(--gris-borde);border-radius:10px;padding:11px 14px;cursor:pointer;font-family:inherit;font-size:.9rem;color:var(--texto);transition:all .15s;}
.cp-opt:hover{border-color:var(--oro);}
.cp-opt.cp-lock{pointer-events:none;}
.cp-opt.cp-ok{border-color:var(--verde);background:var(--verde-suave);font-weight:600;}
.cp-opt.cp-no{border-color:var(--rojo);background:var(--rojo-suave);}
.cp-fb{display:none;margin-top:12px;padding:12px 15px;border-radius:10px;background:var(--azul-suave);border-left:4px solid var(--azul-claro);font-size:.88rem;}
.cp-fb.show{display:block;}
.practica{background:var(--blanco);border:1px solid var(--verde-borde);border-radius:14px;overflow:hidden;margin:16px 0;box-shadow:var(--sombra);}
.practica-head{background:var(--verde-suave);color:var(--verde);font-weight:800;padding:11px 16px;font-size:.9rem;display:flex;align-items:center;gap:8px;}
.practica-body{padding:16px 18px;font-size:.9rem;}
.practica-body p:last-child{margin-bottom:0;}
.ojo{background:var(--ambar-suave);border-left:4px solid var(--oro);border-radius:9px;padding:10px 14px;margin:14px 0;font-size:.86rem;}
.ojo b{color:var(--ambar);}
.fuentes{background:var(--azul-suave);border:1px solid var(--azul-borde);border-radius:13px;padding:16px 20px;margin:22px 0 4px;}
.fuentes .box-title{color:var(--azul);font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.fuentes p{font-size:.88rem;margin-bottom:8px;}
.fuentes a{color:var(--azul-claro);font-weight:700;border-bottom:1px solid var(--oro);}
.fuentes a:hover{color:var(--azul);}
.fuentes .lista li{margin-bottom:9px;}
/* ===== DESARROLLO v3 · estilo editorial (visual nuevo y mejorado) ===== */
.modulo{margin:32px 0;}
.modulo-head{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid var(--oro-borde);}
.modulo-n{flex-shrink:0;min-width:44px;height:44px;padding:0 11px;border-radius:13px;background:linear-gradient(135deg,var(--azul),var(--azul-medio));color:#fff;font-weight:800;font-size:1.15rem;display:flex;align-items:center;justify-content:center;font-family:'Source Serif 4',serif;box-shadow:0 5px 14px rgba(10,42,94,.25);}
.modulo-head h3{font-family:'Source Serif 4',serif;color:var(--azul);font-size:1.32rem;line-height:1.2;margin:0;}
.b-texto{margin:12px 0;}
.b-texto p{margin-bottom:11px;}
.def-panel{background:linear-gradient(180deg,var(--azul-suave),#fff);border:1px solid var(--azul-borde);border-left:5px solid var(--azul-claro);border-radius:0 14px 14px 0;padding:16px 20px;margin:16px 0;}
.def-label{display:block;font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--azul-claro);margin-bottom:6px;}
.def-panel p{font-size:1.03rem;margin-bottom:0;color:var(--texto);}
.def-panel p+p{margin-top:8px;}
.idea{display:flex;gap:12px;align-items:flex-start;background:var(--oro-suave);border:1px solid var(--oro-borde);border-radius:13px;padding:14px 18px;margin:16px 0;}
.idea-ic{font-size:1.3rem;flex-shrink:0;line-height:1.4;}
.idea p{margin-bottom:0;}
.idea strong{color:var(--ambar);}
.ejemplo{background:#fff;border:1px solid var(--verde-borde);border-radius:13px;overflow:hidden;margin:16px 0;box-shadow:var(--sombra);}
.ejemplo-head{background:var(--verde-suave);color:var(--verde);font-weight:800;font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;padding:9px 16px;}
.ejemplo-body{padding:14px 18px;font-size:.95rem;}
.ejemplo-body p{margin-bottom:0;}
.prueba{background:var(--rojo-suave);border:1px solid var(--rojo-borde);border-radius:13px;padding:14px 18px;margin:16px 0;}
.prueba-head{font-weight:800;color:var(--rojo);font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.prueba p{margin-bottom:0;}
.acordeon{display:flex;flex-direction:column;gap:10px;margin:16px 0;}
.acc{border:1px solid var(--gris-borde);border-radius:12px;background:#fff;overflow:hidden;box-shadow:var(--sombra);}
.acc summary{padding:14px 18px;font-weight:700;color:var(--azul);cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;background:linear-gradient(100deg,var(--azul-suave),#fff 92%);}
.acc summary::-webkit-details-marker{display:none;}
.acc summary::after{content:'+';margin-left:auto;font-size:1.4rem;color:var(--oro);font-weight:400;transition:transform .2s;}
.acc[open] summary::after{transform:rotate(45deg);}
.acc-body{padding:16px 20px;font-size:.95rem;border-top:1px solid var(--gris-borde);}
.acc-body p{margin-bottom:10px;}
.acc-body p:last-child{margin-bottom:0;}
.acc-body em{color:var(--texto-suave);}
/* ===== Bloque CÁLCULO · fórmulas y procesos matemáticos paso a paso ===== */
.calculo{background:linear-gradient(180deg,#fff,var(--azul-suave));border:1px solid var(--azul-borde);border-radius:14px;overflow:hidden;margin:18px 0;box-shadow:var(--sombra);}
.calculo-head{background:linear-gradient(100deg,var(--azul),var(--azul-medio));color:#fff;font-weight:800;padding:12px 18px;font-size:.92rem;display:flex;align-items:center;gap:9px;}
.calculo-intro{padding:14px 18px 0;font-size:.93rem;color:var(--texto);}
.calculo-intro p{margin-bottom:0;}
.calc-datos{margin:12px 18px 0;background:var(--oro-suave);border:1px solid var(--oro-borde);border-radius:11px;padding:11px 15px;font-size:.88rem;}
.calc-datos .cd-label{display:block;font-size:.68rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ambar);margin-bottom:5px;}
.calc-datos ul{list-style:none;margin:0;}
.calc-datos li{position:relative;padding-left:18px;margin-bottom:4px;}
.calc-datos li::before{content:'•';position:absolute;left:2px;color:var(--oro);font-weight:800;}
.calc-pasos{display:flex;flex-direction:column;gap:11px;padding:14px 18px;}
.calc-paso{display:flex;gap:13px;align-items:flex-start;background:#fff;border:1px solid var(--gris-borde);border-left:4px solid var(--oro);border-radius:11px;padding:12px 15px;}
.calc-n{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--azul),var(--azul-medio));color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
.calc-body{flex:1;min-width:0;}
.calc-label{font-weight:700;color:var(--azul);font-size:.92rem;margin-bottom:6px;}
.calc-formula{font-family:'Source Serif 4',serif;font-size:1.02rem;font-weight:600;background:var(--gris-bg);border-radius:8px;padding:9px 13px;margin:5px 0;overflow-x:auto;color:var(--texto);}
.calc-formula b,.calc-formula strong{color:var(--ambar);}
.calc-res-paso{font-size:.95rem;color:var(--verde);font-weight:700;margin-top:5px;}
.calc-res-paso::before{content:'➜ ';color:var(--verde);}
.calc-total{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:0 18px 16px;padding:15px 18px;background:var(--verde-suave);border:1.5px solid var(--verde-borde);border-radius:12px;}
.calc-total .ct-label{font-weight:700;color:var(--verde);font-size:.93rem;}
.calc-total .ct-valor{font-family:'Source Serif 4',serif;font-size:1.55rem;font-weight:800;color:var(--verde);}
.calc-nota{font-size:.85rem;color:var(--texto-suave);padding:0 18px 16px;font-style:italic;}
footer{background:var(--azul);color:rgba(255,255,255,0.8);text-align:center;padding:34px 20px;}
footer .f-brand{font-weight:800;color:#fff;font-size:1.1rem;}
footer .f-slogan{color:var(--oro-claro);font-size:.82rem;margin:6px 0 12px;}
footer .f-meta{font-size:.74rem;color:rgba(255,255,255,0.55);}
</style>
</head>
<body>
<div id="readbar"></div>

<header>
  <span class="doc-ref">{{DOC_REF}}</span>
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 100 100" width="32" height="32" aria-hidden="true">
        <circle cx="26" cy="74" r="3.4" fill="#0A2A5E" opacity="0.45"/>
        <circle cx="34" cy="70" r="4.2" fill="#0A2A5E" opacity="0.72"/>
        <path d="M36 66 C48 62 58 54 72 34" fill="none" stroke="#0A2A5E" stroke-width="9" stroke-linecap="round"/>
        <path d="M61 32 L75 30 L73 45" fill="none" stroke="#0A2A5E" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Ascenso Público</div>
      <div class="brand-slogan">Tu ruta personalizada hacia el empleo público</div>
    </div>
  </div>
  <div class="kicker">{{KICKER}}</div>
  <h1>{{H1}}</h1>
  <p class="header-sub">{{HEADER_SUB}}</p>
  <div class="badges">{{BADGES}}</div>
</header>

<nav>
  <button class="active" data-sec="0">🎯 Objetivo</button>
  <button data-sec="1">⭐ Importancia</button>
  <button data-sec="2">📖 Desarrollo</button>
  <button data-sec="3">⚖️ Comparaciones</button>
  <button data-sec="4">📂 Casos</button>
  <button data-sec="5">⚠️ Errores</button>
  <button data-sec="6">💡 Tips</button>
  <button data-sec="7">🎭 Trampas</button>
  <button data-sec="8">🧠 Repaso</button>
  <button data-sec="9">📝 Resumen</button>
  <button data-sec="10">🎓 Simulacro</button>
</nav>

<main>
{{MAIN}}
</main>

<footer>
  <div class="f-brand">Ascenso Público</div>
  <div class="f-slogan">Tu ruta personalizada hacia el empleo público</div>
  <div class="f-meta">{{FOOTER_META}}</div>
</footer>

<script>
const FINALIZAR_MSG={{FINALIZAR_MSG}};
const readbar=document.getElementById('readbar');
window.addEventListener('scroll',()=>{const h=document.documentElement;readbar.style.width=(h.scrollTop/(h.scrollHeight-h.clientHeight)*100)+'%';});
const secciones=[...document.querySelectorAll('.section')];
const navBtns=[...document.querySelectorAll('nav button')];
function showSec(n){secciones.forEach(s=>s.classList.toggle('visible',+s.dataset.sec===n));navBtns.forEach(b=>b.classList.toggle('active',+b.dataset.sec===n));window.scrollTo({top:0,behavior:'smooth'});}
navBtns.forEach(b=>b.addEventListener('click',()=>showSec(+b.dataset.sec)));
const titulos=['Importancia','Desarrollo','Comparaciones','Casos','Errores','Tips','Trampas','Repaso','Resumen','Simulacro'];
secciones.forEach((sec,i)=>{
  const bar=document.createElement('div');bar.className='advance-bar';
  if(i<secciones.length-1){
    bar.innerHTML='<span class="advance-hint">Siguiente: '+titulos[i]+'</span>';
    const btn=document.createElement('button');btn.className='advance-btn';btn.textContent='Avanzar →';btn.addEventListener('click',()=>showSec(i+1));bar.appendChild(btn);
  }else{
    const btn=document.createElement('button');btn.className='advance-btn final';btn.textContent=FINALIZAR_MSG.boton;btn.addEventListener('click',()=>alert(FINALIZAR_MSG.alerta));bar.appendChild(btn);
  }
  sec.appendChild(bar);
});
document.querySelectorAll('.checkpoint').forEach(cp=>{
  const fb=cp.querySelector('.cp-fb');
  cp.querySelectorAll('.cp-opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      cp.querySelectorAll('.cp-opt').forEach(b=>{b.classList.add('cp-lock');if(b.dataset.ok==='1')b.classList.add('cp-ok');});
      if(btn.dataset.ok!=='1')btn.classList.add('cp-no');
      fb.innerHTML=(btn.dataset.ok==='1'?'✅ <strong>¡Correcto!</strong> ':'❌ <strong>Revisa:</strong> ')+btn.dataset.exp;
      fb.classList.add('show');
    });
  });
});
const flashcards={{FLASHCARDS}};
let flashIndex=0;
const flashEl=document.getElementById('flashcard');
const flashFront=document.getElementById('flashFront');
const flashBack=document.getElementById('flashBack');
const flashCounter=document.getElementById('flashCounter');
function renderFlash(){flashEl.classList.remove('flipped');flashFront.textContent=flashcards[flashIndex].f;flashBack.textContent=flashcards[flashIndex].b;flashCounter.textContent='Tarjeta '+(flashIndex+1)+' de '+flashcards.length;}
flashEl.addEventListener('click',()=>flashEl.classList.toggle('flipped'));
document.getElementById('flashFlip').addEventListener('click',e=>{e.stopPropagation();flashEl.classList.toggle('flipped');});
document.getElementById('flashPrev').addEventListener('click',()=>{flashIndex=(flashIndex-1+flashcards.length)%flashcards.length;renderFlash();});
document.getElementById('flashNext').addEventListener('click',()=>{flashIndex=(flashIndex+1)%flashcards.length;renderFlash();});
renderFlash();
const preguntas={{PREGUNTAS}};
const quizDiv=document.getElementById('quiz');
let respondidas={};
// Baraja una copia de un arreglo (Fisher-Yates). Se usa para que las
// opciones A/B/C/D salgan en orden ALEATORIO en cada carga: el estudiante
// entrena criterio, no la posición de la respuesta (estándar tipo CNSC).
function barajar(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function renderQuiz(){
  respondidas={};quizDiv.innerHTML='';
  const nivelLabel={b:'Básica',i:'Intermedia',a:'Avanzada'};
  preguntas.forEach((p,idx)=>{
    p._orden=barajar([0,1,2,3]); // posición visible (0..3) -> índice original de la opción
    const card=document.createElement('div');card.className='pregunta';
    let opsHtml='';
    p._orden.forEach((orig,d)=>{const letra=String.fromCharCode(65+d);opsHtml+='<div class="opcion" data-q="'+idx+'" data-d="'+d+'"><span class="letra">'+letra+'</span><div class="op-body"><span class="op-txt">'+p.ops[orig]+'</span><div class="op-exp" id="oe-'+idx+'-'+d+'"></div></div></div>';});
    card.innerHTML='<div class="q-num">Pregunta '+(idx+1)+' <span class="nivel-pill '+p.nivel+'">'+nivelLabel[p.nivel]+'</span></div>'
      +'<div class="q-contexto">'+p.ctx+'</div><div class="q-texto">'+p.q+'</div><div class="opciones">'+opsHtml+'</div><div class="feedback" id="fb-'+idx+'"></div>';
    quizDiv.appendChild(card);
  });
  document.querySelectorAll('.opcion').forEach(op=>{
    op.addEventListener('click',function(){
      const qi=+this.dataset.q, di=+this.dataset.d;
      if(respondidas[qi]!==undefined)return;
      const p=preguntas[qi];const elegido=p._orden[di];
      respondidas[qi]=elegido; // guardamos el ÍNDICE ORIGINAL elegido (el scoring sigue igual)
      const cont=this.parentElement;
      cont.querySelectorAll('.opcion').forEach((o,d)=>{
        o.classList.add('bloqueada');
        const orig=p._orden[d];
        const exp=document.getElementById('oe-'+qi+'-'+d);const letra=String.fromCharCode(65+d);
        if(orig===p.correcta){o.classList.add('correcta');exp.className='op-exp ok show';exp.innerHTML='✔ <strong>'+letra+' es CORRECTA:</strong> '+p.expl[orig];}
        else{exp.className='op-exp no show';exp.innerHTML='✘ <strong>'+letra+' es incorrecta:</strong> '+p.expl[orig];}
      });
      if(elegido!==p.correcta)this.classList.add('incorrecta');
      const fb=document.getElementById('fb-'+qi);const letraCorrecta=String.fromCharCode(65+p._orden.indexOf(p.correcta));
      if(elegido===p.correcta){fb.className='feedback ok show';fb.innerHTML='✅ <strong>¡Correcto!</strong> Elegiste la opción '+letraCorrecta+'. Abajo tienes la explicación de cada una de las 4 opciones.';}
      else{fb.className='feedback no show';fb.innerHTML='❌ <strong>Incorrecto.</strong> La respuesta correcta es la opción '+letraCorrecta+'. Revisa abajo por qué cada opción es correcta o incorrecta.';}
    });
  });
}
document.getElementById('btnCalcular').addEventListener('click',()=>{
  let correctas=0;const temasFallados=[];
  preguntas.forEach((p,i)=>{if(respondidas[i]===p.correcta)correctas++;else if(temasFallados.indexOf(p.tema)===-1)temasFallados.push(p.tema);});
  const res=document.getElementById('resultado');
  document.getElementById('scoreNum').textContent=correctas+'/'+preguntas.length;
  let msg;const pct=correctas/preguntas.length;
  if(pct>=0.83)msg='🏆 ¡Excelente! Dominas el tema. Listo para el siguiente día.';
  else if(pct>=0.58)msg='👍 Buen trabajo. Refuerza los temas marcados y repite el simulacro.';
  else msg='📚 Vas por buen camino. Repasa el Desarrollo y vuelve a intentarlo.';
  document.getElementById('scoreMsg').textContent=msg;
  const cont=document.getElementById('temasReforzar');
  if(temasFallados.length===0){cont.innerHTML='<div class="box ok" style="text-align:left;"><div class="box-title">🎯 ¡Sin temas pendientes!</div><p>Respondiste todo correctamente. ¡Felicitaciones!</p></div>';}
  else{const items=temasFallados.map(t=>'<li>'+t+'</li>').join('');cont.innerHTML='<div class="box warn" style="text-align:left;"><div class="box-title">📌 Temas que debes reforzar</div><p>Vuelve a la sección <strong>Desarrollo</strong> y repásalos:</p><ul class="lista">'+items+'</ul></div>';}
  res.classList.add('show');res.scrollIntoView({behavior:'smooth'});
});
document.getElementById('btnReiniciar').addEventListener('click',()=>{renderQuiz();document.getElementById('resultado').classList.remove('show');window.scrollTo({top:document.querySelector('[data-sec="10"]').offsetTop,behavior:'smooth'});});
renderQuiz();
</script>
</body>
</html>
