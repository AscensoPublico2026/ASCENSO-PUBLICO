<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulacro Final SIM-001 · Ascenso Público</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --navy: #0A2A5E;
            --cream: #FBF9F4;
            --gold: #E8A33D;
            --text: #1E293B;
            --text-light: #64748B;
            --border: #E2E8F0;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem 1rem;
        }
        
        .container { max-width: 900px; margin: 0 auto; }
        
        .header {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }
        
        .logo-badge {
            background: var(--navy);
            color: var(--gold);
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.875rem;
            display: inline-block;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
        }
        
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .titulo-small {
            font-size: 0.875rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        
        h1 {
            color: var(--navy);
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        
        .meta {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        
        .pregunta {
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin: 2rem 0;
        }
        
        .q-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--cream);
        }
        
        .q-num {
            font-size: 0.875rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        
        .q-tema {
            display: inline-block;
            background: var(--cream);
            color: var(--navy);
            padding: 0.375rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid var(--border);
        }
        
        .caso {
            background: var(--cream);
            padding: 1.75rem;
            border-radius: 8px;
            border-left: 4px solid var(--navy);
            margin: 1.5rem 0;
        }
        
        .caso-label {
            font-size: 0.75rem;
            color: var(--navy);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            margin-bottom: 1rem;
            display: block;
        }
        
        .caso p {
            margin-bottom: 1rem;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text);
        }
        
        .caso p:last-child { margin-bottom: 0; }
        
        .pregunta-texto {
            font-weight: 700;
            color: var(--navy);
        }
        
        .opciones { margin: 2rem 0; }
        
        .opcion {
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: start;
            gap: 1rem;
        }
        
        .opcion:hover {
            border-color: var(--navy);
            box-shadow: 0 2px 12px rgba(10, 42, 94, 0.1);
            transform: translateY(-1px);
        }
        
        .opcion input {
            margin-top: 0.3rem;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--navy);
        }
        
        .opcion-contenido { flex: 1; }
        
        .letra {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 800;
            font-size: 0.875rem;
            margin-right: 0.875rem;
        }
        
        .opcion.opt-a { background: #ECFDF5; border-color: #10B981; }
        .opcion.opt-a .letra { background: #10B981; color: white; }
        
        .opcion.opt-b { background: #FEE2E2; border-color: #EF4444; }
        .opcion.opt-b .letra { background: #EF4444; color: white; }
        
        .opcion.opt-c { background: #DBEAFE; border-color: #3B82F6; }
        .opcion.opt-c .letra { background: #3B82F6; color: white; }
        
        .opcion.opt-d { background: #FEF3C7; border-color: #F59E0B; }
        .opcion.opt-d .letra { background: #F59E0B; color: white; }
        
        .btn-ver {
            background: linear-gradient(135deg, var(--gold) 0%, #D97706 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
            margin: 2.5rem auto 0;
            box-shadow: 0 4px 12px rgba(232, 163, 61, 0.3);
        }
        
        .btn-ver:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(232, 163, 61, 0.4);
        }
        
        .retro {
            background: white;
            border: 3px solid var(--navy);
            border-radius: 12px;
            padding: 2rem;
            margin: 2rem 0;
            display: none;
        }
        
        .retro.visible { 
            display: block; 
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .retro-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--cream);
        }
        
        .retro-header h3 {
            color: var(--navy);
            font-size: 1.5rem;
            font-weight: 800;
        }
        
        .analisis {
            background: var(--cream);
            border-radius: 10px;
            padding: 1.75rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid var(--border);
        }
        
        .analisis.correcta {
            background: #ECFDF5;
            border-left-color: #10B981;
        }
        
        .analisis.incorrecta {
            background: #FEE2E2;
            border-left-color: #EF4444;
        }
        
        .analisis-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        
        .analisis-titulo {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            font-weight: 700;
            color: var(--navy);
            font-size: 1.05rem;
        }
        
        .badge {
            padding: 0.375rem 1rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .badge.correcta { background: #10B981; color: white; }
        .badge.incorrecta { background: #EF4444; color: white; }
        
        .analisis p {
            margin-bottom: 1rem;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text);
        }
        
        .analisis p:last-of-type { margin-bottom: 0; }
        
        .norma {
            background: white;
            border-left: 4px solid var(--navy);
            padding: 1rem 1.25rem;
            border-radius: 0 8px 8px 0;
            font-size: 0.9rem;
            margin-top: 1.25rem;
        }
        
        .norma strong { color: var(--navy); }
        
        .clave {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border-left: 5px solid var(--gold);
            padding: 1.75rem;
            border-radius: 10px;
            margin: 1.5rem 0;
        }
        
        .clave h4 {
            color: var(--navy);
            font-size: 1.125rem;
            margin-bottom: 0.875rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .reforzar {
            background: var(--cream);
            border: 3px dashed var(--navy);
            padding: 1.75rem;
            border-radius: 10px;
            margin-top: 1.5rem;
        }
        
        .reforzar h4 {
            color: var(--navy);
            font-size: 1.125rem;
            margin-bottom: 1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .reforzar a {
            display: block;
            color: var(--navy);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 0.625rem;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        
        .reforzar a:hover { 
            color: var(--gold);
            text-decoration: underline;
        }
        
        .footer {
            text-align: center;
            padding: 3rem 2rem;
            margin-top: 4rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .footer strong { color: var(--navy); }
        
        @media (max-width: 768px) {
            body { padding: 1rem 0.75rem; }
            h1 { font-size: 1.5rem; }
            .pregunta { padding: 2rem 1.5rem; }
            .retro { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-badge">ASCENSO PÚBLICO</div>
            <div class="header-top">
                <span class="titulo-small">Simulacro Final · 5 preguntas</span>
            </div>
            <h1>Técnico Operativo 314-03 · Almacén</h1>
            <p class="meta">INDERVALLE · Nivel Técnico · Preparación CNSC</p>
        </div>
